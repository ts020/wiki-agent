name: verify

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-05-11
      - name: Run locked tests
        run: cargo test --locked
      - name: Run continuous verification
        shell: bash
        run: bash scripts/verify.sh

  package:
    name: package verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-05-11
      - name: Check package contents
        run: cargo package --no-verify --list
      - name: Run package verification
        run: cargo package --locked
