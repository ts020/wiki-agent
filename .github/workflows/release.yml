name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
      - "[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example 0.1.0 or v0.1.0"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: md-wiki
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: md-wiki
            linker: aarch64-linux-gnu-gcc
            apt: gcc-aarch64-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: md-wiki
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: md-wiki
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: md-wiki.exe
    steps:
      - name: Resolve tag ref
        id: ref
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          printf 'tag=%s\n' "$tag" >>"$GITHUB_OUTPUT"
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ steps.ref.outputs.tag }}
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-05-11
        with:
          targets: ${{ matrix.target }}
      - name: Install cross linker
        if: matrix.apt != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt }}
      - name: Configure cross linker
        if: matrix.linker != ''
        shell: bash
        run: |
          target_env="$(echo '${{ matrix.target }}' | tr 'a-z-' 'A-Z_')"
          printf 'CARGO_TARGET_%s_LINKER=%s\n' "$target_env" "${{ matrix.linker }}" >>"$GITHUB_ENV"
      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}
      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist/package"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/package/${{ matrix.binary }}"
          cp README.md LICENSE "dist/package/"
          tar -C "dist/package" -czf "dist/md-wiki-${{ matrix.target }}.tar.gz" .
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: md-wiki-${{ matrix.target }}
          path: dist/md-wiki-${{ matrix.target }}.tar.gz

  publish:
    name: publish release assets
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Resolve tag ref
        id: ref
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          version="${tag#v}"
          printf 'tag=%s\n' "$tag" >>"$GITHUB_OUTPUT"
          printf 'version=%s\n' "$version" >>"$GITHUB_OUTPUT"
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ steps.ref.outputs.tag }}
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: dist
          pattern: md-wiki-*
          merge-multiple: true
      - name: Write checksums
        run: |
          cd dist
          sha256sum md-wiki-*.tar.gz > checksums.txt
      - name: Resolve release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.ref.outputs.version }}"
          tag="${{ steps.ref.outputs.tag }}"
          for candidate in \
            "docs/releases/v${version}.md" \
            "docs/releases/${version}.md" \
            "docs/releases/${tag}.md"
          do
            if [ -f "$candidate" ]; then
              printf 'path=%s\n' "$candidate" >>"$GITHUB_OUTPUT"
              exit 0
            fi
          done
          printf 'path=\n' >>"$GITHUB_OUTPUT"
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.ref.outputs.tag }}
          NOTES_PATH: ${{ steps.notes.outputs.path }}
        run: |
          set -euo pipefail
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/* --clobber
          else
            if [ -n "$NOTES_PATH" ]; then
              gh release create "$TAG_NAME" dist/* \
                --title "$TAG_NAME" \
                --notes-file "$NOTES_PATH"
            else
              gh release create "$TAG_NAME" dist/* \
                --title "$TAG_NAME" \
                --generate-notes
            fi
          fi
