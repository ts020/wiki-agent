name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: md-wiki
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: md-wiki
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: md-wiki
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: md-wiki.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}
      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist/package"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/package/${{ matrix.binary }}"
          cp README.md LICENSE "dist/package/"
          tar -C "dist/package" -czf "dist/md-wiki-${{ matrix.target }}.tar.gz" .
      - uses: actions/upload-artifact@v4
        with:
          name: md-wiki-${{ matrix.target }}
          path: dist/md-wiki-${{ matrix.target }}.tar.gz

  publish:
    name: publish release assets
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: md-wiki-*
          merge-multiple: true
      - name: Write checksums
        run: |
          cd dist
          sha256sum md-wiki-*.tar.gz > checksums.txt
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/* --clobber
          else
            gh release create "$TAG_NAME" dist/* \
              --draft \
              --title "$TAG_NAME" \
              --notes-file docs/releases/v0.1.0.md
          fi
